<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
    <title>ОТС и системный анализ — понятный тренажёр к экзамену (1–30)</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --accent: #2563eb;
            --accent-light: #dbeafe;
            --accent-dark: #1d4ed8;
            --badge-bg: #eef2ff;
            --badge-text: #3730a3;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            --shadow-hover: 0 8px 18px rgba(0, 66, 128, 0.07);
            --radius: 1.8rem;
            --radius-sm: 1rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, 'Helvetica Neue', sans-serif;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 2.5rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.05), 0 8px 18px rgba(0, 20, 30, 0.08);
            padding: 2rem 2rem 2.5rem;
            margin: 1rem 0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
            border-bottom: 3px solid #e9eef3;
            padding-bottom: 1.2rem;
        }
        h1 span {
            background: var(--accent-light);
            padding: 0.2rem 1rem;
            border-radius: 3rem;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--accent);
        }

        .mode-tabs {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0 1.2rem;
            flex-wrap: wrap;
        }
        .mode-tab {
            padding: 0.7rem 1.6rem;
            border-radius: 2.5rem;
            border: 2px solid var(--border);
            background: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .mode-tab:hover {
            border-color: #b9c9dd;
            background: #f9fbfd;
        }
        .mode-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .controls-row {
            display: flex;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.7rem 1.2rem;
            border: 1px solid #dce3eb;
            border-radius: 2.5rem;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            background: #fff;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-dark);
        }
        .btn-outline {
            background: #fff;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: #b9c9dd;
            background: #f9fbfd;
        }
        .btn-success {
            background: var(--success);
            color: #fff;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn-danger {
            background: #fff;
            border: 2px solid #fecaca;
            color: #b91c1c;
        }
        .btn-danger:hover {
            background: #fef2f2;
        }

        .question-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .card {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }
        .card:hover {
            border-color: #b9c9dd;
            box-shadow: var(--shadow-hover);
        }
        .card-header {
            padding: 1rem 1.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: background 0.15s;
            gap: 0.8rem;
        }
        .card-header:hover {
            background: #f9fbfd;
        }
        .card.active .card-header {
            background: #f1f5f9;
            border-bottom: 1px solid #dce3eb;
        }
        .question-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
        }
        .toggle-icon {
            font-size: 1.6rem;
            font-weight: 300;
            color: #64748b;
            transition: transform 0.25s;
            line-height: 1;
            min-width: 28px;
            text-align: center;
        }
        .card.active .toggle-icon {
            transform: rotate(45deg);
            color: var(--accent);
        }
        .card-body {
            max-height: 0;
            overflow: hidden;
            padding: 0 1.4rem;
            transition: max-height 0.4s ease-in-out, padding 0.2s;
            background: #ffffff;
            color: #334155;
        }
        .card.active .card-body {
            max-height: 6000px;
            padding: 1rem 1.4rem 1.6rem;
        }
        .content-block {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        .list-styled {
            padding-left: 1.5rem;
            margin: 0.3rem 0 0.5rem;
        }
        .list-styled li {
            margin-bottom: 0.3rem;
        }
        .highlight {
            background: #f1f5f9;
            border-radius: var(--radius-sm);
            padding: 0.7rem 1.1rem;
            font-weight: 500;
            color: #0f172a;
            margin: 0.4rem 0;
        }
        .grid-examples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 0.6rem;
            margin-top: 0.3rem;
        }
        .example-box {
            background: #f8fafc;
            border: 1px solid #e9eef3;
            border-radius: var(--radius-sm);
            padding: 0.7rem;
            font-size: 0.9rem;
        }
        .scholar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.8rem;
            align-items: baseline;
        }
        .scholar strong {
            min-width: 150px;
            color: #0f172a;
        }
        hr {
            border: 0;
            border-top: 1px solid #e2e8f0;
            margin: 0.7rem 0;
        }
        .hidden-card {
            display: none;
        }

        .flashcard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .flashcard-stats {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 0.95rem;
            background: #f8fafc;
            padding: 0.9rem 1.6rem;
            border-radius: 2rem;
            width: 100%;
        }
        .flashcard-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-correct {
            background: var(--success);
        }
        .dot-wrong {
            background: var(--error);
        }
        .dot-remaining {
            background: #cbd5e1;
        }
        .progress-bar-bg {
            flex: 1;
            min-width: 100px;
            height: 7px;
            background: #e2e8f0;
            border-radius: 1rem;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 1rem;
            transition: width 0.35s;
        }
        .flashcard {
            background: #ffffff;
            border: 2px solid var(--border);
            border-radius: 2rem;
            padding: 2rem 2rem 1.8rem;
            width: 100%;
            max-width: 750px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }
        .flashcard .question-number {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
        }
        .flashcard .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }
        .flashcard .question-full {
            font-size: 1rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 1.4rem;
            line-height: 1.5;
            text-align: left;
            background: #f9fafb;
            padding: 1rem 1.2rem;
            border-radius: 1rem;
            border: 1px dashed #dce3eb;
        }
        .flashcard .answer-reveal {
            display: none;
            text-align: left;
            background: #f0fdf4;
            border-radius: 1.2rem;
            padding: 1.2rem 1.5rem;
            margin: 1rem 0 1.5rem;
            font-size: 0.95rem;
            color: #334155;
            border: 1px solid #bbf7d0;
        }
        .flashcard .answer-reveal.show {
            display: block;
        }
        .flashcard .btn-row {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }
        .btn-lg {
            padding: 0.9rem 2rem;
            font-size: 1rem;
            border-radius: 2.5rem;
        }
        .btn-ghost {
            background: #fff;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            background: #f8fafc;
        }
        .empty-flashcard {
            text-align: center;
            padding: 3rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--success);
        }
        .confetti {
            font-size: 3rem;
        }

        @media (max-width: 550px) {
            body {
                padding: 0.5rem;
            }
            .container {
                padding: 1.2rem 0.8rem;
                border-radius: 1.8rem;
            }
            .flashcard {
                padding: 1.5rem 1rem;
            }
            .flashcard .question-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📘 Системный анализ <span>ОТС 1–30</span></h1>

        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="study">📚 Все вопросы</button>
            <button class="mode-tab" data-mode="flashcards">🃏 Карточки (самопроверка)</button>
        </div>

        <div id="studyMode">
            <div class="controls-row">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по вопросам и ответам...">
                <button class="btn btn-outline" id="expandAllBtn">📖 Развернуть все</button>
            </div>
            <div class="question-grid" id="accordion"></div>
        </div>

        <div id="flashcardMode" style="display: none;">
            <div class="flashcard-container" id="flashcardContainer"></div>
        </div>
    </div>

    <script>
        (function() {
            const questions = [
                {
                    id: 1,
                    title: "Понятие множества и подмножества",
                    fullQuestion: "Что такое множество и подмножество? Приведите пример.",
                    badge: "основа",
                    content: `
                        <p><strong>Множество</strong> — это просто набор каких-то объектов, которые мы объединили по общему признаку. Объекты внутри множества называются его элементами.</p>
                        <p><strong>Подмножество</strong> — это часть множества. Все элементы подмножества одновременно являются элементами исходного, большего множества. Обозначается знаком ⊆.</p>
                        <p><strong>Простой пример из жизни:</strong></p>
                        <ul class="list-styled">
                            <li>Множество — все студенты твоей группы (например, 25 человек).</li>
                            <li>Подмножество — те из них, кто получает повышенную стипендию (например, 5 человек).</li>
                            <li>Каждый стипендиат — студент группы, поэтому это подмножество.</li>
                        </ul>
                        <p>Это базовая математическая концепция, которая лежит в основе многих системных понятий: система — это множество элементов со связями, подсистема — подмножество элементов.</p>
                    `
                },
                {
                    id: 2,
                    title: "Понятие системы",
                    fullQuestion: "Что называют системой? Дайте развёрнутое определение.",
                    badge: "база",
                    content: `
                        <p><strong>Система</strong> — это когда у нас есть не просто куча разрозненных деталей, а они как-то связаны между собой и вместе делают что-то осмысленное, работают на общий результат.</p>
                        <p>Формально: система — это совокупность взаимосвязанных элементов, образующих единое целое и функционирующих для достижения определённой цели.</p>
                        <p><strong>Ключевые моменты, которые нужно понять:</strong></p>
                        <ul class="list-styled">
                            <li>Есть <strong>элементы</strong> — составные части системы.</li>
                            <li>Есть <strong>связи</strong> — они соединяют элементы, заставляют их взаимодействовать.</li>
                            <li>Есть <strong>целостность</strong> — система ведёт себя как единый организм, а не как свалка деталей.</li>
                            <li>Есть <strong>цель</strong> — система существует не просто так, а для чего-то.</li>
                        </ul>
                        <p>Пример: автомобиль — это система. Двигатель, колёса и руль по отдельности не едут. Но когда они правильно соединены, появляется новое свойство — способность перемещаться.</p>
                    `
                },
                {
                    id: 3,
                    title: "Основные направления системных исследований",
                    fullQuestion: "Какие есть направления в изучении систем? Опишите каждое.",
                    badge: "7 направлений",
                    content: `
                        <p>Системные исследования — это не одна наука, а целое семейство дисциплин, которые смотрят на системы с разных сторон:</p>
                        <ul class="list-styled">
                            <li><strong>Общая теория систем</strong> — пытается найти универсальные законы, которые работают для любых систем: хоть биологических, хоть технических, хоть социальных. Основатель — Людвиг фон Берталанфи. Идея в том, что муравейник, фирма и компьютерная сеть могут подчиняться одним и тем же принципам организации.</li>
                            <li><strong>Кибернетика</strong> — наука об управлении и связи. Как машины и живые организмы получают информацию, обрабатывают её и реагируют? Основатель — Норберт Винер. Ключевое понятие — обратная связь.</li>
                            <li><strong>Системный анализ</strong> — это уже прикладная методология. Когда у нас есть запутанная проблема (например, пробки в городе или неэффективное производство), системный анализ даёт инструменты, чтобы разобраться, найти причины и выбрать лучшее решение.</li>
                            <li><strong>Исследование операций</strong> — математические методы для поиска оптимальных решений. Как распределить ограниченные ресурсы наилучшим образом? Линейное программирование, теория игр, теория массового обслуживания — это всё отсюда.</li>
                            <li><strong>Теория управления</strong> — изучает, как заставить систему делать то, что нам нужно. Разрабатывает регуляторы, алгоритмы управления, законы обратной связи.</li>
                            <li><strong>Синергетика</strong> — самая философская из всех. Изучает, как в сложных неравновесных системах самопроизвольно возникает порядок. Почему из хаоса рождаются структуры? Основатели — Герман Хакен и Илья Пригожин.</li>
                            <li><strong>Системотехника</strong> — инженерная дисциплина. Как спроектировать и построить сложную техническую систему (космический корабль, энергосеть), чтобы она работала надёжно и эффективно.</li>
                        </ul>
                    `
                },
                {
                    id: 4,
                    title: "Понятия, характеризующие систему",
                    fullQuestion: "Какими основными терминами описывают любую систему?",
                    badge: "10 понятий",
                    content: `
                        <p>Когда мы говорим о системе, мы пользуемся определённым набором понятий. Вот основной словарь системного аналитика:</p>
                        <p><strong>Элемент</strong> — самая простая, неделимая часть системы в рамках решаемой задачи. Если мы изучаем автомобиль, то элемент — это двигатель. А если мы изучаем двигатель, то его элементы — поршни и клапаны.</p>
                        <p><strong>Связь</strong> — то, что соединяет элементы. Это могут быть физические соединения (трубы, провода), информационные каналы или даже отношения подчинённости.</p>
                        <p><strong>Структура</strong> — устойчивая схема связей, скелет системы. Если элементы — это органы, то структура — это скелет, который держит их вместе в определённом порядке.</p>
                        <p><strong>Цель</strong> — то, ради чего система существует. У автомобиля — перемещение, у предприятия — прибыль, у системы отопления — поддержание температуры.</p>
                        <p><strong>Среда</strong> — всё, что снаружи системы, но может на неё влиять. Для предприятия среда — это рынок, законы, конкуренты, погода.</p>
                        <p><strong>Вход</strong> — ресурсы, которые система получает из среды. Сырьё, энергия, информация, деньги.</p>
                        <p><strong>Выход</strong> — то, что система выдаёт обратно в среду. Готовая продукция, услуги, отходы, отчёты.</p>
                        <p><strong>Функция</strong> — роль или работа, которую выполняет элемент (или система в целом). Функция двигателя — преобразовывать топливо в движение.</p>
                        <p><strong>Состояние</strong> — мгновенный снимок системы: значения всех её характеристик в данный момент времени. Температура, скорость, загрузка.</p>
                        <p><strong>Поведение</strong> — как состояние системы меняется с течением времени, её динамика.</p>
                    `
                },
                {
                    id: 5,
                    title: "Свойства систем",
                    fullQuestion: "Какими свойствами обладают системы? Раскройте каждое.",
                    badge: "8 свойств",
                    content: `
                        <p>Любая система обладает набором характерных свойств. Вот ключевые:</p>
                        <ul class="list-styled">
                            <li><strong>Целостность</strong> — система работает как единый организм. Нельзя понять систему, изучая её по кусочкам, нужно смотреть на целое. Отключи у автомобиля рулевое управление — и остальные части уже не сделают его машиной.</li>
                            <li><strong>Эмерджентность</strong> — самое важное и красивое свойство! У целого появляются новые качества, которых не было ни у одной из частей по отдельности. Куча металла не летает, а собранный по схеме самолёт — летает. Вода тушит огонь, а водород и кислород по отдельности — нет. Эмерджентность — это когда 1+1=3.</li>

                        <p><strong>Синтез</strong> — обратный процесс. Мы собираем ранее выделенные части обратно в целое, чтобы понять, как они взаимодействуют и какое новое качество рождается из их соединения. Синтез — это не просто «склеить обратно», а получить новое знание о целом.</p>

                    badge: "ОТС",
                    content: `
                        <p><strong>Людвиг фон Берталанфи</strong> — австрийский биолог, который в середине XX века совершил прорыв в научном мышлении. Его главная заслуга: он первым громко и аргументированно сказал, что все системы — от живой клетки до государства — подчиняются общим принципам, и нужно создать науку, которая будет эти принципы изучать.</p>
                        <p><strong>Что конкретно он сделал:</strong></p>

                            <li>Ввёл и развил понятие <strong>открытых систем</strong> — таких, которые обмениваются веществом и энергией со средой. До него наука в основном изучала закрытые, изолированные системы. Берталанфи показал, что живой организм — принципиально открытая система, и это меняет всё.</li>
                            <li>Обнаружил явление <strong>эквифинальности</strong>: открытые системы могут приходить к одному и тому же конечному состоянию разными путями, независимо от начальных условий. Это противоположно жёсткому детерминизму классической физики.</li>
                            <li>Доказал, что в разных науках действуют <strong>изоморфные (одинаковые по форме) законы</strong>. Например, логистическая кривая роста описывает и рост популяции бактерий, и распространение инноваций в обществе.</li>
                        </ul>
                    `
                },
                {
                    id: 29,
                    title: "Работы Норберта Винера",
                    fullQuestion: "Кто такой Норберт Винер и что он сделал для науки?",
                    badge: "кибернетика",
                    content: `
                        <p><strong>Норберт Винер</strong> — американский математик, которого называют отцом кибернетики. В 1948 году он выпустил книгу <strong>«Кибернетика, или Управление и связь в животном и машине»</strong> — и эта книга дала рождение целой науке.</p>

                            <li><strong>Единство законов управления.</strong> Неважно, кто управляется — робот, животное или организация. Всюду есть получение информации, её обработка и выработка управляющих сигналов.</li>
                            <li><strong>Информация — не метафора, а измеримая величина.</strong> Винер (вместе с Клодом Шенноном) заложил основы теории информации, показав, что информацию можно измерять и передавать по каналам с помехами.</li>
                            <li><strong>Предсказание эры автоматов.</strong> Винер одним из первых всерьёз заговорил о возможности создания мыслящих машин и об этических проблемах, которые это вызовет.</li>

                {
                    id: 30,
                    title: "Русские и советские учёные",
                    fullQuestion: "Кто из российских и советских учёных внёс вклад в системные исследования?",
                    badge: "школа",
                    content: `
                        <p>Российская и советская наука дала миру несколько мощных фигур в области системных исследований:</p>

                        <div class="scholar"><strong>👤 Виктор Глушков</strong> (1923–1982) — главный идеолог автоматизированных систем управления (АСУ). Предлагал создать общегосударственную автоматизированную систему (ОГАС) для управления экономикой СССР — по сути, предтечу цифровой экономики. Не всё удалось реализовать, но идеи опередили время.</div>
                        <div class="scholar"><strong>👤 Анатолий Китов</strong> (1920–2005) — пионер военной кибернетики и вычислительной техники. Ещё в 1950-х предлагал строить общегосударственную компьютерную сеть, но его идеи не были поддержаны тогдашним руководством.</div>
                        <div class="scholar"><strong>👤 Пётр Анохин</strong> (1898–1974) — физиолог, создал теорию функциональных систем. Объяснил, как организм предвидит результат действия (акцептор результата действия) и как строится целенаправленное поведение. Эта теория применима не только в биологии, но и в психологии, педагогике, управлении.</div>
                        <hr>
                        <p>Эти люди заложили основы того, что сейчас называют системным подходом, информатикой и кибернетикой в нашей стране. Их работы — не просто история, многие идеи актуальны до сих пор.</p>
                    `

            const studyModeDiv = document.getElementById('studyMode');
            const flashcardModeDiv = document.getElementById('flashcardMode');
            const accordionContainer = document.getElementById('accordion');
            const flashcardContainer = document.getElementById('flashcardContainer');
            const searchInput = document.getElementById('searchInput');
            const expandAllBtn = document.getElementById('expandAllBtn');
            const modeTabs = document.querySelectorAll('.mode-tab');

            let currentMode = 'study';

            function renderStudyMode() {
                if (!accordionContainer) return;
                accordionContainer.innerHTML = '';
                questions.forEach((q, i) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.index = i;
                    card.dataset.title = (q.title + ' ' + q.fullQuestion).toLowerCase();
                    card.dataset.content = q.content.replace(/<[^>]+>/g, '').toLowerCase();

                    card.innerHTML = `<div class="card-header"><div class="question-title">${q.id}. ${q.title} <span class="badge">${q.badge}</span></div><span class="toggle-icon">+</span></div><div class="card-body"><div class="content-block"><p><em>${q.fullQuestion}</em></p>${q.content}</div></div>`;

                    card.querySelector('.card-header').addEventListener('click', () => {
                        card.classList.toggle('active');
                        updateExpandAllBtn();
                    });

                    accordionContainer.appendChild(card);
                });
                updateExpandAllBtn();
            }

            function updateExpandAllBtn() {
                if (!expandAllBtn) return;
                const v = document.querySelectorAll('#accordion .card:not(.hidden-card)');
                if (v.length === 0) { expandAllBtn.textContent = '📖 Развернуть все'; return; }
                expandAllBtn.textContent = Array.from(v).every(c => c.classList.contains('active')) ? '📕 Свернуть все' : '📖 Развернуть все';
            }

            function filterStudyCards() {
                if (!searchInput) return;
                const q = searchInput.value.trim().toLowerCase();
                document.querySelectorAll('#accordion .card').forEach(c => {
                    if (q === '' || c.dataset.title.includes(q) || c.dataset.content.includes(q)) c.classList.remove('hidden-card');
                    else { c.classList.add('hidden-card'); c.classList.remove('active'); }
                });
                updateExpandAllBtn();
            }

            function expandAllStudyCards() {
                const v = document.querySelectorAll('#accordion .card:not(.hidden-card)');
                if (v.length === 0) return;
                const all = Array.from(v).every(c => c.classList.contains('active'));
                v.forEach(c => all ? c.classList.remove('active') : c.classList.add('active'));
                updateExpandAllBtn();
            }

            let wrongPile = [], currentCardIndex = 0, totalCorrect = 0, totalWrong = 0;

            function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

            function initFlashcards() { wrongPile = shuffle([...questions]); currentCardIndex = 0; totalCorrect = 0; totalWrong = 0; renderFlashcard(); }

            function renderFlashcard() {
                if (!flashcardContainer) return;
                if (wrongPile.length === 0) {
                    flashcardContainer.innerHTML = `<div class="empty-flashcard"><div class="confetti">🎉</div><p>Всё выучено!</p><p style="font-size:0.9rem;">Верно: ${totalCorrect} | Исправлено ошибок: ${totalWrong}</p><button class="btn btn-primary btn-lg" id="restartFlashcardsBtn">🔄 Начать заново</button></div>`;
                    document.getElementById('restartFlashcardsBtn')?.addEventListener('click', initFlashcards);
                    return;
                }
                const totalRem = wrongPile.length, totalEver = totalCorrect + totalWrong + totalRem, percent = totalEver > 0 ? Math.round((totalCorrect / totalEver) * 100) : 0;
                const q = wrongPile[currentCardIndex];
                flashcardContainer.innerHTML = `<div class="flashcard-stats"><div class="stat-item"><span class="dot dot-correct"></span> Верно: <strong>${totalCorrect}</strong></div><div class="stat-item"><span class="dot dot-wrong"></span> Ошибок: <strong>${totalWrong}</strong></div><div class="stat-item"><span class="dot dot-remaining"></span> Осталось: <strong>${totalRem}</strong></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percent}%;"></div></div></div><div class="flashcard" id="activeFlashcard"><div class="question-number">Вопрос ${q.id} из 30</div><div class="question-text">${q.title}</div><div class="question-full">${q.fullQuestion}</div><div class="answer-reveal" id="answerReveal"><strong>📖 Ответ:</strong><div style="margin-top:0.5rem;">${q.content}</div></div><div class="btn-row"><button class="btn btn-outline btn-lg" id="showAnswerBtn">👁 Показать ответ</button></div><div class="btn-row" id="selfEvalBtns" style="display:none;"><button class="btn btn-success btn-lg" id="markCorrectBtn">✅ Верно</button><button class="btn btn-danger btn-lg" id="markWrongBtn">❌ Неверно</button></div></div><button class="btn btn-ghost" id="resetFlashcardsBtn" style="margin-top:0.5rem;">🔄 Сбросить все</button>`;
                document.getElementById('showAnswerBtn')?.addEventListener('click', () => { document.getElementById('answerReveal').classList.add('show'); document.getElementById('showAnswerBtn').style.display = 'none'; document.getElementById('selfEvalBtns').style.display = 'flex'; });
                document.getElementById('markCorrectBtn')?.addEventListener('click', () => { totalCorrect++; wrongPile.splice(currentCardIndex, 1); if (wrongPile.length > 0 && currentCardIndex >= wrongPile.length) currentCardIndex = 0; renderFlashcard(); });
                document.getElementById('markWrongBtn')?.addEventListener('click', () => { totalWrong++; const m = wrongPile.splice(currentCardIndex, 1)[0]; wrongPile.push(m); if (currentCardIndex >= wrongPile.length) currentCardIndex = 0; renderFlashcard(); });
                document.getElementById('resetFlashcardsBtn')?.addEventListener('click', initFlashcards);
            }

            function switchMode(m) {
                currentMode = m;
                modeTabs.forEach(t => { t.classList.remove('active'); if (t.dataset.mode === m) t.classList.add('active'); });
                studyModeDiv.style.display = m === 'study' ? 'block' : 'none';
                flashcardModeDiv.style.display = m === 'flashcards' ? 'block' : 'none';
                if (m === 'study') renderStudyMode(); else initFlashcards();
            }

            modeTabs.forEach(t => t.addEventListener('click', () => { if (t.dataset.mode !== currentMode) switchMode(t.dataset.mode); }));
            if (searchInput) searchInput.addEventListener('input', filterStudyCards);
            if (expandAllBtn) expandAllBtn.addEventListener('click', expandAllStudyCards);
            switchMode('study');
        })();
    </script>
</body>
