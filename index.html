<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
    <title>ОТС и системный анализ — понятный тренажёр к экзамену (1–30)</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --accent: #2563eb;
            --accent-light: #dbeafe;
            --accent-dark: #1d4ed8;
            --badge-bg: #eef2ff;
            --badge-text: #3730a3;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            --shadow-hover: 0 8px 18px rgba(0, 66, 128, 0.07);
            --radius: 1.8rem;
            --radius-sm: 1rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, 'Helvetica Neue', sans-serif;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 2.5rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.05), 0 8px 18px rgba(0, 20, 30, 0.08);
            padding: 2rem 2rem 2.5rem;
            margin: 1rem 0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
            border-bottom: 3px solid #e9eef3;
            padding-bottom: 1.2rem;
        }
        h1 span {
            background: var(--accent-light);
            padding: 0.2rem 1rem;
            border-radius: 3rem;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--accent);
        }

        .mode-tabs {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0 1.2rem;
            flex-wrap: wrap;
        }
        .mode-tab {
            padding: 0.7rem 1.6rem;
            border-radius: 2.5rem;
            border: 2px solid var(--border);
            background: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .mode-tab:hover {
            border-color: #b9c9dd;
            background: #f9fbfd;
        }
        .mode-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .controls-row {
            display: flex;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.7rem 1.2rem;
            border: 1px solid #dce3eb;
            border-radius: 2.5rem;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            background: #fff;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-dark);
        }
        .btn-outline {
            background: #fff;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: #b9c9dd;
            background: #f9fbfd;
        }
        .btn-success {
            background: var(--success);
            color: #fff;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn-danger {
            background: #fff;
            border: 2px solid #fecaca;
            color: #b91c1c;
        }
        .btn-danger:hover {
            background: #fef2f2;
        }

        .question-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .card {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }
        .card:hover {
            border-color: #b9c9dd;
            box-shadow: var(--shadow-hover);
        }
        .card-header {
            padding: 1rem 1.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: background 0.15s;
            gap: 0.8rem;
        }
        .card-header:hover {
            background: #f9fbfd;
        }
        .card.active .card-header {
            background: #f1f5f9;
            border-bottom: 1px solid #dce3eb;
        }
        .question-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
        }
        .toggle-icon {
            font-size: 1.6rem;
            font-weight: 300;
            color: #64748b;
            transition: transform 0.25s;
            line-height: 1;
            min-width: 28px;
            text-align: center;
        }
        .card.active .toggle-icon {
            transform: rotate(45deg);
            color: var(--accent);
        }
        .card-body {
            max-height: 0;
            overflow: hidden;
            padding: 0 1.4rem;
            transition: max-height 0.4s ease-in-out, padding 0.2s;
            background: #ffffff;
            color: #334155;
        }
        .card.active .card-body {
            max-height: 6000px;
            padding: 1rem 1.4rem 1.6rem;
        }
        .content-block {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        .list-styled {
            padding-left: 1.5rem;
            margin: 0.3rem 0 0.5rem;
        }
        .list-styled li {
            margin-bottom: 0.3rem;
        }
        .highlight {
            background: #f1f5f9;
            border-radius: var(--radius-sm);
            padding: 0.7rem 1.1rem;
            font-weight: 500;
            color: #0f172a;
            margin: 0.4rem 0;
        }
        .grid-examples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 0.6rem;
            margin-top: 0.3rem;
        }
        .example-box {
            background: #f8fafc;
            border: 1px solid #e9eef3;
            border-radius: var(--radius-sm);
            padding: 0.7rem;
            font-size: 0.9rem;
        }
        .scholar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.8rem;
            align-items: baseline;
        }
        .scholar strong {
            min-width: 150px;
            color: #0f172a;
        }
        hr {
            border: 0;
            border-top: 1px solid #e2e8f0;
            margin: 0.7rem 0;
        }
        .hidden-card {
            display: none;
        }

        .flashcard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .flashcard-stats {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 0.95rem;
            background: #f8fafc;
            padding: 0.9rem 1.6rem;
            border-radius: 2rem;
            width: 100%;
        }
        .flashcard-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-correct {
            background: var(--success);
        }
        .dot-wrong {
            background: var(--error);
        }
        .dot-remaining {
            background: #cbd5e1;
        }
        .progress-bar-bg {
            flex: 1;
            min-width: 100px;
            height: 7px;
            background: #e2e8f0;
            border-radius: 1rem;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 1rem;
            transition: width 0.35s;
        }
        .flashcard {
            background: #ffffff;
            border: 2px solid var(--border);
            border-radius: 2rem;
            padding: 2rem 2rem 1.8rem;
            width: 100%;
            max-width: 750px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }
        .flashcard .question-number {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
        }
        .flashcard .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }
        .flashcard .question-full {
            font-size: 1rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 1.4rem;
            line-height: 1.5;
            text-align: left;
            background: #f9fafb;
            padding: 1rem 1.2rem;
            border-radius: 1rem;
            border: 1px dashed #dce3eb;
        }
        .flashcard .answer-reveal {
            display: none;
            text-align: left;
            background: #f0fdf4;
            border-radius: 1.2rem;
            padding: 1.2rem 1.5rem;
            margin: 1rem 0 1.5rem;
            font-size: 0.95rem;
            color: #334155;
            border: 1px solid #bbf7d0;
        }
        .flashcard .answer-reveal.show {
            display: block;
        }
        .flashcard .btn-row {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }
        .btn-lg {
            padding: 0.9rem 2rem;
            font-size: 1rem;
            border-radius: 2.5rem;
        }
        .btn-ghost {
            background: #fff;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            background: #f8fafc;
        }
        .empty-flashcard {
            text-align: center;
            padding: 3rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--success);
        }
        .confetti {
            font-size: 3rem;
        }

        @media (max-width: 550px) {
            body {
                padding: 0.5rem;
            }
            .container {
                padding: 1.2rem 0.8rem;
                border-radius: 1.8rem;
            }
            .flashcard {
                padding: 1.5rem 1rem;
            }
            .flashcard .question-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📘 Системный анализ <span>ОТС 1–30</span></h1>
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="study">📚 Все вопросы</button>
            <button class="mode-tab" data-mode="flashcards">🃏 Карточки</button>
        </div>
        <div id="studyMode">
            <div class="controls-row">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск...">
                <button class="btn btn-outline" id="expandAllBtn">📖 Развернуть все</button>
            </div>
            <div class="question-grid" id="accordion"></div>
        </div>
        <div id="flashcardMode" style="display:none;">
            <div class="flashcard-container" id="flashcardContainer"></div>
        </div>
    </div>
    <script>
        (function() {
            const questions = [
                {
                    id:1, title:"Понятие множества и подмножества",
                    fullQuestion:"Что такое множество и подмножество? Приведите пример.",
                    badge:"основа",
                    content:`<p><strong>Множество</strong> — это просто набор каких-то объектов, которые мы объединили по общему признаку. Например, все студенты твоей группы — это множество.</p><p><strong>Подмножество</strong> — это часть этого набора. Скажем, внутри множества всех студентов можно выделить подмножество тех, кто учится на отлично. Важно, что любой элемент подмножества одновременно входит и в исходное множество.</p>`
                },
                {
                    id:2, title:"Понятие системы",
                    fullQuestion:"Что называют системой?",
                    badge:"база",
                    content:`<p><strong>Система</strong> — это когда у нас есть не просто куча разрозненных деталей, а они как-то связаны между собой и вместе делают что-то осмысленное. То есть система — это совокупность элементов, которые взаимодействуют друг с другом ради какой-то цели. Главное: есть части, есть связи между ними, и всё это работает как единое целое.</p>`
                },
                {
                    id:3, title:"Основные направления системных исследований",
                    fullQuestion:"Какие есть направления в изучении систем?",
                    badge:"7 направлений",
                    content:`<ul class="list-styled"><li><strong>Общая теория систем</strong> — пытается найти универсальные законы, которые работают для любых систем: хоть биологических, хоть технических.</li><li><strong>Кибернетика</strong> — наука об управлении и связи: как машины и живые организмы обмениваются информацией и реагируют на неё.</li><li><strong>Системный анализ</strong> — прикладная методология: когда нужно разобраться в сложной проблеме и принять взвешенное решение.</li><li><strong>Исследование операций</strong> — математические методы поиска оптимальных решений (например, как распределить ресурсы).</li><li><strong>Теория управления</strong> — изучает, как управлять разными системами, чтобы они делали то, что нам нужно.</li><li><strong>Синергетика</strong> — про самоорганизацию: как из хаоса рождается порядок в сложных системах.</li><li><strong>Системотехника</strong> — инженерное направление: как проектировать и строить сложные технические системы.</li></ul>`
                },
                {
                    id:4, title:"Понятия, характеризующие систему",
                    fullQuestion:"Какими словами описывают систему?",
                    badge:"10 понятий",
                    content:`<p>Когда мы говорим о системе, мы обычно оперируем такими терминами:</p><p><strong>Элемент</strong> — самая простая часть, которую в рамках задачи мы считаем неделимой.</p><p><strong>Связь</strong> — то, что соединяет элементы, обеспечивает их взаимодействие.</p><p><strong>Структура</strong> — устойчивая схема связей, скелет системы.</p><p><strong>Цель</strong> — то, ради чего система существует и работает.</p><p><strong>Среда</strong> — всё, что снаружи, всё, что окружает систему и может на неё влиять.</p><p><strong>Вход</strong> — ресурсы, энергия, информация, которые поступают в систему.</p><p><strong>Выход</strong> — результат работы системы, то, что она выдаёт наружу.</p><p><strong>Функция</strong> — роль, задача, которую выполняет элемент или система.</p><p><strong>Состояние</strong> — снимок системы в конкретный момент: значения всех её параметров.</p><p><strong>Поведение</strong> — как состояние меняется во времени.</p>`
                },
                {
                    id:5, title:"Свойства систем",
                    fullQuestion:"Какие у систем есть свойства?",
                    badge:"8 свойств",
                    content:`<ul class="list-styled"><li><strong>Целостность</strong> — система ведёт себя как единое целое, а не как свалка деталей.</li><li><strong>Эмерджентность</strong> — у целого появляются новые свойства, которых не было у отдельных частей. Классика: куча деталей сама по себе не летает, а собранный самолёт — летает.</li><li><strong>Иерархичность</strong> — любая система входит в состав чего-то большего, и сама состоит из подсистем.</li><li><strong>Структурность</strong> — элементы не просто рядом лежат, а определённым образом связаны.</li><li><strong>Целенаправленность</strong> — система работает не просто так, а для чего-то.</li><li><strong>Адаптивность</strong> — способность приспосабливаться к изменениям вокруг.</li><li><strong>Управляемость</strong> — можно ли извне изменить поведение системы в нужную сторону.</li><li><strong>Устойчивость</strong> — способность держаться, не разваливаться при внешних воздействиях.</li></ul>`
                },
                {
                    id:6, title:"Классификация систем",
                    fullQuestion:"Как системы можно классифицировать?",
                    badge:"виды",
                    content:`<p>Системы делят по разным признакам:</p><p><strong>По происхождению:</strong> естественные (природа создала: лес, организм) и искусственные (человек сделал: завод, компьютер).</p><p><strong>По контакту со средой:</strong> открытые (активно обмениваются со средой веществом, энергией, информацией) и закрытые (почти изолированы, обмен минимален).</p><p><strong>По сложности:</strong> простые, сложные и сверхсложные — зависит от числа элементов и запутанности связей.</p><p><strong>По тому, меняются ли во времени:</strong> статические (состояние застыло) и динамические (состояние постоянно меняется).</p>`
                },
                {
                    id:7, title:"Границы системы",
                    fullQuestion:"Что такое граница системы и что через неё проходит?",
                    badge:"потоки",
                    content:`<p><strong>Граница</strong> — это условная линия, которая отделяет «внутри» от «снаружи». Мы сами решаем, где её провести, в зависимости от того, что изучаем. Через границу система взаимодействует со средой: туда-сюда движутся <strong>материалы</strong> (сырьё, продукция), <strong>энергия</strong> (электричество, тепло) и <strong>информация</strong> (сигналы, данные, обратная связь).</p>`
                },
                {
                    id:8, title:"Системный подход",
                    fullQuestion:"В чём суть системного подхода?",
                    badge:"метод",
                    content:`<p>Это способ мышления, при котором мы смотрим на объект не как на кучу независимых частей, а как на <strong>единое целое</strong>. Главный принцип: свойства целого не сводятся к сумме свойств его частей. Нельзя понять, как работает автомобиль, изучая по отдельности руль, двигатель и колёса — нужно смотреть, как они взаимодействуют. Системный подход требует учитывать связи, влияние среды и иерархию.</p>`
                },
                {
                    id:9, title:"Моделирование системы",
                    fullQuestion:"Что такое моделирование и зачем оно нужно?",
                    badge:"цели",
                    content:`<p><strong>Моделирование</strong> — это когда мы создаём упрощённую копию системы (модель), чтобы изучать её без риска и лишних затрат. Вместо того чтобы экспериментировать на реальном заводе или самолёте, мы экспериментируем на модели. Цели: <strong>анализ</strong> (понять, как работает), <strong>прогноз</strong> (что будет, если...), <strong>проектирование</strong> (создать что-то новое) и <strong>управление</strong> (найти лучший способ воздействия).</p>`
                },
                {
                    id:10, title:"Модель чёрного ящика, состава и структуры",
                    fullQuestion:"Какие есть три базовые модели системы?",
                    badge:"3 модели",
                    content:`<p><strong>Чёрный ящик</strong> — мы не лезем внутрь, а просто смотрим: вот что подаём на вход, вот что получаем на выходе. Удобно, когда внутреннее устройство неизвестно или неважно.</p><p><strong>Модель состава</strong> — перечисляем все детали, из которых система состоит. Но связи между ними пока не показываем.</p><p><strong>Структурная модель</strong> — здесь уже видно не только детали, но и то, как они друг с другом соединены. Это схема скелета системы.</p>`
                },
                {
                    id:11, title:"Свойства моделей систем",
                    fullQuestion:"Какими качествами должна обладать хорошая модель?",
                    badge:"6 свойств",

            modeTabs.forEach(t=>t.addEventListener('click',()=>{if(t.dataset.mode!==currentMode)switchMode(t.dataset.mode);}));
            if(searchInput)searchInput.addEventListener('input',filterStudyCards);
            if(expandAllBtn)expandAllBtn.addEventListener('click',expandAllStudyCards);
            switchMode('study');
        })();
    </script>
</body>
</html>
